<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>Медична · Patient App</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: var(--paper-3); display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../_shared/Primitives.jsx"></script>
<script type="text/babel" src="./ios-frame.jsx"></script>
<script type="text/babel" src="./Screens.jsx"></script>
<script type="text/babel">
  function App() {
    const [tab, setTab] = React.useState('home');
    const [showResults, setShowResults] = React.useState(false);
    let screen;
    if (tab === 'home' && !showResults) screen = <PatientHome name="Олена" onOpenResults={() => setShowResults(true)} />;
    else if (tab === 'home' && showResults) screen = <PatientResults onBack={() => setShowResults(false)} />;
    else if (tab === 'results') screen = <PatientResults onBack={() => setTab('home')} />;
    else if (tab === 'visits') screen = <PatientPlaceholder label="Візити — клікабельна заглушка" />;
    else if (tab === 'chat')   screen = <PatientPlaceholder label="Чат з лікарем — клікабельна заглушка" />;
    else screen = <PatientPlaceholder label="Профіль — клікабельна заглушка" />;

    return (
      <IOSDevice width={390} height={820} title="Медична">
        <div style={{ position: 'relative', height: '100%', background: 'var(--paper)' }}>
          {screen}
          <PatientTabBar active={tab} onChange={(id) => { setTab(id); setShowResults(false); }} />
        </div>
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
