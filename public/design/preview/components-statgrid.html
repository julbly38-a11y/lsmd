  <div style="background:#fff;border:1px solid #d8d5cf;border-radius:6px;padding:14px"><div style="font-family:'IBM Plex Mono',monospace;font-weight:300;font-size:24px;color:#1a1917;line-height:1">7.3</div><div style="margin-top:6px;font-family:var(--mono);font-weight:500;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:#9c9890">Сер.ліжкодень</div></div>
</div>
