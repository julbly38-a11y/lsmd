<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div class="label">Error & empty state</div>
<div style="display:flex;gap:14px;flex-wrap:wrap">
  <div style="background:#fff;border:1px solid #d8d5cf;border-radius:4px 18px 18px 18px;padding:14px 18px;max-width:340px">
    <div style="display:flex;gap:10px;align-items:flex-start">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:#c0392b;color:#fff;font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:12px;border-radius:3px;flex-shrink:0">!</span>
      <p style="font-size:13px;color:#c0392b;font-family:'IBM Plex Sans',sans-serif;line-height:1.5">Немає ключа GROQ_API_KEY в Netlify</p>
    </div>
  </div>
  <div style="background:#fff;border:1px solid #d8d5cf;border-radius:6px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:8px;max-width:240px">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:24px;color:#9c9890;line-height:1">○</span>
    <p style="font-size:13px;color:#6b6760;font-family:'IBM Plex Sans',sans-serif">Результатів не знайдено</p>
  </div>
</div>
</body></html>
