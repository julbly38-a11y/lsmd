<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div class="label">Semantic · used sparingly, only for state</div>
<div class="row">
  <div class="swatch"><div class="fill" style="background:#16a34a"></div><div class="meta"><div class="name">--green</div><div class="hex">#16a34a · "free" badge</div></div></div>
  <div class="swatch"><div class="fill" style="background:#c0392b"></div><div class="meta"><div class="name">--red</div><div class="hex">#c0392b · errors</div></div></div>
  <div class="swatch"><div class="fill" style="background:#b45309"></div><div class="meta"><div class="name">--amber</div><div class="hex">#b45309 · reserved</div></div></div>
</div>
<div style="margin-top:14px;font-family:var(--mono);font-size:11px;color:#6b6760;line-height:1.6">
  No chromatic accent in the system. The "accent" token equals <span style="color:#1a1917;font-weight:500">--text</span> — high-emphasis = inverted ink, never colored fill.
</div>
</body></html>
