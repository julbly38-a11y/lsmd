<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div class="label">Input · 8px radius, hairline border, focus = ink</div>
<div style="display:flex;gap:8px;align-items:center;max-width:560px">
  <input style="flex:1;padding:12px 18px;border:1px solid #d8d5cf;border-radius:8px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;background:#fff;color:#1a1917;outline:none" placeholder="Запитайте про дані лікарні..."/>
  <button style="padding:12px 20px;background:#1a1917;color:#f5f4f0;border:none;border-radius:8px;font-size:18px;font-family:'IBM Plex Mono',monospace;cursor:pointer">→</button>
</div>
<div style="margin-top:12px;display:flex;gap:8px;align-items:center;max-width:560px">
  <input style="flex:1;padding:12px 18px;border:1px solid #1a1917;border-radius:8px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;background:#fff;color:#1a1917;outline:none" value="Летальність по відділеннях"/>
  <button style="padding:12px 20px;background:#1a1917;color:#f5f4f0;border:none;border-radius:8px;font-size:18px;font-family:'IBM Plex Mono',monospace;cursor:pointer">→</button>
</div>
<div style="margin-top:10px;font-family:var(--mono);font-size:10px;color:#9c9890">default · focused (border = --text)</div>
</body></html>
