<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div class="label">Iconography · typographic-character set</div>
<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:8px;font-family:'IBM Plex Mono',monospace">
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">+</div><div style="font-size:9px;color:#9c9890;margin-top:4px">mark</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">→</div><div style="font-size:9px;color:#9c9890;margin-top:4px">send</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">↓</div><div style="font-size:9px;color:#9c9890;margin-top:4px">in</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">↑</div><div style="font-size:9px;color:#9c9890;margin-top:4px">out</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">Σ</div><div style="font-size:9px;color:#9c9890;margin-top:4px">total</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">▼</div><div style="font-size:9px;color:#9c9890;margin-top:4px">show</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">▲</div><div style="font-size:9px;color:#9c9890;margin-top:4px">hide</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">○</div><div style="font-size:9px;color:#9c9890;margin-top:4px">empty</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">·</div><div style="font-size:9px;color:#9c9890;margin-top:4px">sep</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#c0392b">!</div><div style="font-size:9px;color:#9c9890;margin-top:4px">error</div></div>
  <div style="text-align:center;padding:8px;background:#fff;border:1px solid #d8d5cf;border-radius:4px"><div style="font-size:18px;color:#1a1917">—</div><div style="font-size:9px;color:#9c9890;margin-top:4px">empty cell</div></div>
</div>
</body></html>
