<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
<div class="label">Table · mono cells, tracked uppercase headers</div>
<div style="border:1px solid #d8d5cf;border-radius:6px;overflow:hidden;max-width:640px">
  <table style="width:100%;border-collapse:collapse;font-size:13px;font-family:'IBM Plex Mono',monospace">
    <thead>
      <tr style="background:#eeecea">
        <th style="padding:8px 12px;text-align:left;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#6b6760;border-bottom:1px solid #d8d5cf">Відділення</th>
        <th style="padding:8px 12px;text-align:left;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#6b6760;border-bottom:1px solid #d8d5cf">Кардіологія</th>
        <th style="padding:8px 12px;text-align:left;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#6b6760;border-bottom:1px solid #d8d5cf">Летальність %</th>
      </tr>
    </thead>
    <tbody>
      <tr><td style="padding:7px 12px;border-bottom:1px solid #d8d5cf;color:#1a1917">Хірургія</td><td style="padding:7px 12px;border-bottom:1px solid #d8d5cf;color:#1a1917">2,341</td><td style="padding:7px 12px;border-bottom:1px solid #d8d5cf;color:#1a1917">3.2</td></tr>
      <tr><td style="padding:7px 12px;border-bottom:1px solid #d8d5cf;color:#1a1917">Терапія</td><td style="padding:7px 12px;border-bottom:1px solid #d8d5cf;color:#1a1917">1,887</td><td style="padding:7px 12px;border-bottom:1px solid #d8d5cf;color:#1a1917">1.8</td></tr>
      <tr><td style="padding:7px 12px;color:#1a1917">Реанімація</td><td style="padding:7px 12px;color:#1a1917">412</td><td style="padding:7px 12px;color:#1a1917">12.4</td></tr>
    </tbody>
  </table>
</div>
<div style="margin-top:6px;font-family:var(--mono);font-size:11px;color:#9c9890">3 записів</div>
</body></html>
