---
name: lsmd-design
description: Use this skill to generate well-branded interfaces and assets for ЛСМД (Lviv City Emergency Hospital — medical-analytics product line on Supabase + GitHub), either for production or throwaway prototypes/mocks/etc. Contains essential design guidelines, colors, type, fonts, assets, and UI kit components for prototyping.
user-invocable: true
---

Read the README.md file within this skill, and explore the other available files.
If creating visual artifacts (slides, mocks, throwaway prototypes, etc), copy assets out and create static HTML files for the user to view. If working on production code, you can copy assets and read the rules here to become an expert in designing with this brand.
If the user invokes this skill without any other guidance, ask them what they want to build or design, ask some questions, and act as an expert designer who outputs HTML artifacts _or_ production code, depending on the need.

Visual signature in one line: warm-paper background `#f5f4f0`, near-black ink `#1a1917`, IBM Plex Sans for prose + IBM Plex Mono for everything else, hairline `1px #d8d5cf` borders, **zero shadows**, asymmetric chat bubbles (`18 18 4 18` user / `4 18 18 18` agent), no chromatic accent (high-emphasis = inverted ink), no emoji, typographic-character icons (`+ → ↓ ↑ Σ ▼ ▲ ○ · ! —`).

Key files:
- `colors_and_type.css` — all design tokens + semantic type classes
- `assets/logo-mark.svg`, `assets/logo-lockup.svg` — the only logo assets
- `assets/ICONOGRAPHY.md` — icon usage rules
- `ui_kits/asystent/` — pixel-faithful recreation of the chat / analytics surface
- `preview/` — atomic specimens of every system primitive
