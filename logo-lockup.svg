## Real database schema (the source of truth)

The dashboard mirrors these tables one-to-one. Read this section before changing any KPI label.

| Table | Rows | Purpose |
|---|---|---|
| **`lsmd`** | 110,206 | Encounters / госпіталізації. Key cols: `id_case`, `admission_type` (Екстренна/Планова), `admission_department`, `current_department`, `discharge_department`, `icd_admission`, `icd_primary`, `doc_name`, `doctor_id`, `discharge_status`, `operation_id`, `length_of_stay`, `admission_ts`, `discharge_ts`, `day_type` (будній/вихідний), `shift_time`, `patient_id` |
| **`patients_best`** | 72,293 | Patients registry. Cols: `patient_id`, `full_name`, `short_name`, `patient_name`, `parental`, `age`, `gender`, `locality`, `district`, `region`, `category`, `locality_id` → FK `localities.id` |
| **`empl`** | 868 | Employees. Cols: `name_id`, `full_name`, `specialization`, `department`, `department_id` → FK `departments.id`, `position`, `emp_status` |
| **`departments`** | 20 | Real departments with `dept_name`, `staff_count`, `doctors_count`, `head_empl_id`, `category_id`, `block_id` |
| **`doctor_stats`** | 265 | Per-doctor materialized view: `total_cases`, `day_cases`, `night_cases`, `weekend_cases`, `unique_patients`, `deaths`, `improved`, `avg_los`, `first_case`, `last_case` |
| **`icd_chapters`** | 22 | Top-level МКХ-10 chapters (Roman numerals, letter ranges) |
| **`icd_blocks`** | 220 | МКХ-10 blocks (e.g. K00–K93). Joined to chapters via `chapter_id` |
| **`icd_10`** | varies | ICD codes 3 levels deep, generated `icd_code`, `usage_count`, `block_id` |
| **`operations`** | 7,320 | Unique operation codes with `cases_count` |
| **`localities`** | 2,618 | Cities/districts with `latitude`, `longitude` for map view |
| **`dept_transfers_matrix`** | 143 | Sparse matrix of patient transfers between departments + `avg_los` |
| **`doctor_shifts`** | (per shift) | Daily shift summaries |
| `parasit` `neoplastics` `blood` `endo` `lor` `krovoobig` `resp` `gastro` `skin` `osteo` `uro` `pregnan` `perinatal` `teratos` `deviation` `traum` `accidental` | 0 | Nosology lookup tables per МКХ chapter — not yet populated |

