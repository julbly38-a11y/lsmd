## VISUAL FOUNDATIONS

### Palette
**Single chromatic accent — medical red.** Reserved for: brand mark (`+`), primary CTAs, active nav links, peak bar in charts, featured pricing tier, MKX chapter letter, "Помер" status, link underlines. Most of the UI remains monochrome.

| Token | Hex | Use |
|---|---|---|
| `--bg` | `#f5f4f0` | Page — warm paper |
| `--bg2` | `#eeecea` | Code, table headers |
| `--surface` | `#ffffff` | Cards, sidebar, inputs |
| `--border` | `#d8d5cf` | Hairline dividers |
| `--text` | `#1a1917` | Primary ink |
| `--text2` | `#6b6760` | Secondary |
| `--text3` | `#9c9890` | Tertiary, labels |
| **`--brand`** | **`#c0392b`** | **Medical red — logo, CTAs, links, peaks** |
| `--brand-hover` | `#a93222` | CTA hover |
| `--brand-soft` | `#fbecea` | Soft brand-tinted badges |
| `--green` | `#16a34a` | "З поліпшенням" / success / "безкоштовно" |
| `--amber` | `#b45309` | "З погіршенням" / warning |

**Accent rules:** max **one red element per visible row** — never several. Red never sits behind text-as-text. The chat surface keeps monochrome inverted-ink CTAs to preserve the existing product's calm — brand red appears in the dashboard chrome around it.

### Typography
- **IBM Plex Sans** — body, prose, examples (300/400/500)
- **IBM Plex Mono** — display headings, labels, metadata, table cells, code, KPI numbers, logo wordmark (300/400/500)
- The light-weight mono headline (Plex Mono 300, 28–56px) is the editorial signature.

### Spacing — 4-pt grid
Common rhythms: 16/20/24/32/40px. Sidebar 260px. Marketing hero 80px vertical.

### Surfaces, borders, radii, shadows
- Flat fills only — **no gradients, no patterns, no imagery**
- One border width: `1px`, one color: `--border`
- Radii: `4px` (tables), `6px` (chips, cards), `8px` (inputs, buttons)
- Asymmetric chat bubbles: `18 18 4 18` user, `4 18 18 18` agent
- **Zero shadows.** Elevation = white surface + 1px border.

### Animation
`0.15s`, `cubic-bezier(0.4, 0, 0.2, 1)`. Only keyframe in production is the typing-dot pulse.

---

## ICONOGRAPHY

Brand has **no icon set**. Icons are typographic — single Plex Mono characters: `+ → ↓ ↑ Σ ▼ ▲ ○ · ! — ◆ ▦ ◐ ⌘ ✚ ⚙`.

If a real icon is genuinely needed, use **Lucide** (stroke 1.5, 16px, `currentColor`). Flag it as a substitution.

---

## CAVEATS

- **Sub-table population.** 17 nosology tables (`parasit`, `neoplastics`, `blood`, etc.) exist but are empty. The dashboard doesn't show them yet.
- **`lsmd_doctors` is empty.** Doctor identity lives in `empl` + `doctor_stats`. The `doctor_id` column in `lsmd` is sparsely populated — most rows reference doctors by `doc_name` string only. If a clean join is needed, populate `lsmd_doctors`.
- **Encoding artifacts.** A handful of rows have garbled Cyrillic (`Жі��оча`, `З поліп��енням`). Trivial counts (<10 rows per variant). Pre-process before charting.
- **No real chart library yet** — mocks use CSS/SVG bars. Confirm Recharts / Visx / D3 before production.
- **AI Asystent chat keeps monochrome CTAs** by design (preserve calm of existing product). Brand red lives in dashboard chrome around it.

