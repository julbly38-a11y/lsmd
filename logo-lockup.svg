## CONTENT FUNDAMENTALS

**Language.** Ukrainian first. Russian accepted on input in the AI tab.

**Voice & person — two registers:**
- **Marketing pages** (Home, About, Pricing): slightly warmer second-person plural / inclusive "we" — `Ми перетворюємо медичні дані...`. Still restrained — short declarative sentences, no exclamation marks, no hype words, no marketing puffery. One human sentence per section, then the proof.
- **Dashboard / AI tab**: imperative second-person familiar — `Запитуйте...`, `Натисни...`. Reads like the engineering pair-programmer it is.

**Tone.** Quiet confidence. The product proves itself with numbers, not adjectives. `110,206 госпіталізацій` does more work than any headline could.

**Casing.**
- Sentence case for prose, headlines, buttons.
- lowercase for mono microcopy: `показати SQL`, `безкоштовно`.
- UPPERCASE + 0.08em tracking, Plex Mono 500 — the signature label style for sidebar groups, KPI captions, table headers: `АНАЛІТИКА`, `ІНСТРУМЕНТИ`, `СЕСІЯ`, `ЛЕТАЛЬНІСТЬ`.
- **ЛСМД** always uppercase.

**Punctuation.** Em-dash `—` is the joiner. Middle-dot `·` separates metadata. `○` empty result. `—` empty cell. Σ for totals. No emoji.

**Numbers.** Plex Mono 300 at large sizes for hero numbers. en-US locale separator: `110,206`. Currency: `$0.0042` for sub-cent.

