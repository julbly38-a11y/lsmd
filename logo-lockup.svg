# ЛСМД Design System

Editorial design system for **ЛСМД — Лікарня Швидкої Медичної Допомоги** (Hospital of Emergency Medical Care, Чернівці). A medical-analytics platform built on top of a real PostgreSQL/Supabase database of **110,206 hospitalizations** over five+ years.

Visual language: warm paper, near-black ink, IBM Plex throughout, hairline borders, **one chromatic accent — medical red `#c0392b`** used sparingly for brand mark, primary CTAs, active navigation, and links.

---

## Company / product context

ЛСМД — інформаційна компанія / medical-analytics company. The flagship product is a hospital dashboard with an in-product AI assistant that translates natural-language questions into SQL.

